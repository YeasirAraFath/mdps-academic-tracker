<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDPS Tracker — Khulna University</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c14; --bg2:#0d1220; --card:#111827; --card2:#141e2e;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#e8edf5; --text2:#7a8fa8; --text3:#3d5068;
  --ct:#ff5e6c; --assign:#f5a623; --present:#818cf8; --class:#34d399;
  --accent:#6366f1; --accent2:#818cf8;
  --blue:#4f7cff; --blue2:#7b9fff;
  --green:#22c55e; --green2:#4ade80;
  --amber:#f59e0b; --amber2:#fbbf24;
  --red:#ef4444; --purple:#a78bfa;
  --glow:rgba(99,102,241,0.35); --glow-blue:rgba(79,124,255,0.3);
  --sh:0 2px 8px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.03);
  --sh2:0 8px 32px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05);
  --r:14px; --rsm:9px; --font:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
  --sb-w:248px; --header-h:68px;
}
/* ══ LIGHT MODE ══ */
body.light-mode {
  --bg:#f1f5fb; --bg2:#e4eaf5; --card:#ffffff; --card2:#f7f9ff;
  --border:rgba(60,80,140,0.12); --border2:rgba(60,80,140,0.22);
  --text:#0d1526; --text2:#4a5872; --text3:#8a9bb8;
  --ct:#d63646; --assign:#c47a00; --present:#5048d4; --class:#0a875e;
  --accent:#3d62f0; --accent2:#6a84f5;
  --blue:#3d62f0; --blue2:#6a84f5;
  --green:#0f9f5e; --green2:#2ec47a;
  --amber:#d97706; --amber2:#f59e0b;
  --red:#d63646; --purple:#6d5fd6;
  --glow:rgba(61,98,240,0.18); --glow-blue:rgba(61,98,240,0.2);
  --sh:0 1px 3px rgba(20,40,100,0.06),0 4px 14px rgba(20,40,100,0.07);
  --sh2:0 4px 18px rgba(20,40,100,0.11),0 10px 36px rgba(20,40,100,0.08);
}

/* Global Styles */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:17px;scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background 0.3s,color 0.3s;}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(79,124,255,0.06) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(99,102,241,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(34,211,153,0.07) 0%,transparent 50%),radial-gradient(ellipse 50% 60% at 60% 30%,rgba(129,140,248,0.06) 0%,transparent 50%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;}

/* Sidebar */
.sidebar{width:var(--sb-w);flex-shrink:0;background:rgba(8,12,20,0.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform 0.3s ease;}
.sb-logo{padding:1.3rem 1.2rem 1rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.sb-logo-row{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;}
.sb-crest{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#1a3a6b,#0f2450);border:1px solid rgba(79,124,255,0.35);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.sb-logo h1{font-size:0.8rem;font-weight:700;letter-spacing:-0.02em;color:var(--text);line-height:1.3;}
.sb-logo p{font-size:0.6rem;color:var(--text3);font-family:var(--mono);}
.sb-logo .ku{font-size:0.62rem;color:var(--blue2);font-weight:600;}

/* Profile pill */
.profile-pill{margin:0.8rem 0.9rem;background:linear-gradient(135deg,rgba(79,124,255,0.1),rgba(129,140,248,0.05));border-radius:var(--r);padding:0.65rem 0.75rem;display:flex;align-items:center;gap:0.7rem;cursor:pointer;transition:all 0.15s;border:1px solid rgba(79,124,255,0.2);}
.pp-av{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;font-size:0.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative;}
.pp-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pp-name{font-size:0.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pp-id{font-size:0.6rem;color:var(--text3);font-family:var(--mono);}

/* Nav */
.nb{display:flex;align-items:center;gap:0.6rem;width:100%;padding:0.5rem 0.72rem;border-radius:var(--rsm);border:none;background:none;color:var(--text2);font-family:var(--font);font-size:0.78rem;font-weight:500;cursor:pointer;margin-bottom:1px;text-align:left;}
.nb.active{background:linear-gradient(135deg,rgba(79,124,255,0.18),rgba(79,124,255,0.08));color:var(--blue2);font-weight:600;border:1px solid rgba(79,124,255,0.22);}
.nb .nc{margin-left:auto;font-size:0.6rem;font-family:var(--mono);background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:999px;}

/* Main Layout */
.app{display:flex;min-height:100vh;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.page{display:none;padding:0 2rem 2rem;} .page.active{display:block;}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;padding:1.5rem 2rem 0;margin-bottom:1.4rem;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:0.35rem;padding:0.45rem 0.9rem;border-radius:var(--rsm);font-family:var(--font);font-weight:600;font-size:0.75rem;cursor:pointer;border:none;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);color:#fff;}
.btn-ghost{background:rgba(255,255,255,0.04);color:var(--text2);border:1px solid var(--border);}
.set-btn{width:100%;display:flex;align-items:center;gap:0.5rem;padding:0.48rem 0.7rem;border-radius:var(--rsm);border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text2);font-family:var(--font);font-size:0.76rem;cursor:pointer;}

/* Status Badges */
.view-badge, .owner-badge {font-size:0.62rem;font-weight:700;padding:0.25rem 0.7rem;border-radius:999px;display:none;align-items:center;gap:0.3rem;}
body.view-only .view-badge {display:flex; background:rgba(129,140,248,0.12); color:var(--present);}
body.owner-mode .owner-badge {display:flex; background:rgba(52,211,153,0.1); color:var(--class);}

/* KPI Cards */
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.6rem;}
.kpi-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:var(--r);padding:1.3rem 1.4rem;position:relative;}
.kpi-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:0.2rem;}

/* Event Card */
.ecard{background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--border);border-radius:var(--r);padding:0.8rem 1rem;display:grid;grid-template-columns:3px 1fr auto;gap:0.85rem;align-items:center;cursor:pointer;margin-bottom:0.5rem;}
.estripe{border-radius:99px;align-self:stretch;min-height:32px;}
.etitle{font-size:0.83rem;font-weight:600;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* View Only Logic */
body.view-only .btn-primary, body.view-only .btn-ghost[onclick*="openAdd"] {display:none!important;}

/* Countdown Cards */
.cdw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.6rem;margin-bottom:0.5rem;}
.cdw-card{border-radius:var(--r);padding:0.85rem 1rem;border:1px solid var(--border);box-shadow:var(--sh);position:relative;overflow:hidden;cursor:pointer;transition:all 0.2s;}
.cdw-card.urgent{border-color:rgba(255,94,108,0.3);background:rgba(255,94,108,0.06);}
.cdw-card.soon{border-color:rgba(245,166,35,0.3);background:rgba(245,166,35,0.06);}
.cdw-card.ok{border-color:rgba(52,211,153,0.25);background:rgba(52,211,153,0.05);}
.cdw-title{font-size:0.82rem;font-weight:700;margin-bottom:0.2rem;}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
.overlay.open{display:flex;}
.modal{background:var(--card2);border:1px solid var(--border2);border-radius:18px;padding:1.6rem 1.8rem;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,0.6);max-height:90vh;overflow-y:auto;}
.frow{margin-bottom:0.9rem;}
.finput{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:0.6rem 0.8rem;border-radius:var(--rsm);outline:none;}
</style>
</head>
<body class="owner-mode">
<div class="app">

<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-row">
      <div class="sb-crest">🎓</div>
      <div>
        <h1>MDPS Tracker</h1>
        <p class="ku">Khulna University</p>
        <p>MDPS 26 · 2025–2026</p>
      </div>
    </div>
    <div style="display:flex;gap:0.4rem;margin-top:0.35rem;">
      <div class="view-badge">👁 View Only</div>
      <div class="owner-badge">✏️ Owner</div>
    </div>
  </div>
  
  <div class="profile-pill" onclick="openSettings()">
    <div class="pp-av" id="sb-av-wrap"><span id="sb-av-init">YA</span></div>
    <div class="pp-info">
      <div class="pp-name" id="sb-name">AraFath</div>
      <div class="pp-id" id="sb-id">MDPS - 261510</div>
    </div>
  </div>

  <nav style="padding:0.5rem 0.7rem;flex:1;">
    <button class="nb active" onclick="go('dashboard')">🏠 Dashboard <span class="nc" id="nc-all">0</span></button>
    <button class="nb" onclick="go('events')">📋 All Events</button>
    <button class="nb" onclick="go('courses')">📘 Courses</button>
  </nav>

  <div style="padding:0.7rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:0.4rem;">
    <button class="set-btn" id="gdrive-btn" onclick="handleDriveClick()">
      <span id="gdrive-icon">☁️</span> <span id="gdrive-label">Sync to Drive</span>
    </button>
    <button class="set-btn" onclick="publishPublicSnapshot()" style="background:rgba(34,211,153,0.1); border-color:var(--green);">
      🔄 Sync Public Link
    </button>
    <div id="gdrive-status" style="font-size:0.6rem;font-family:var(--mono);color:var(--text3);text-align:center;cursor:pointer;" onclick="copyShareUrl()"></div>
    <div id="view-only-notice" style="font-size:0.62rem;color:var(--text3);text-align:center;display:none;">
      👁 Viewing <strong id="owner-name-display">AraFath</strong>'s tracker
    </div>
    <button class="set-btn" onclick="toggleTheme()">🌓 Toggle Theme</button>
  </div>
</aside>

<main class="main">
  <div class="page active" id="page-dashboard">
    <div class="topbar">
      <div><h2 id="dash-greet">Good afternoon!</h2><p id="dash-date"></p></div>
      <button class="btn btn-primary" onclick="openAddEvent()">+ Add Event</button>
    </div>

    <div class="kpi-row" id="kpi-row"></div>
    <div id="dash-countdown"></div>
    
    <div style="margin-top:1rem">
      <h3>Recent Events</h3>
      <div id="dash-events" style="margin-top:0.5rem"></div>
    </div>
  </div>

  <div class="page" id="page-events">
    <div class="topbar"><h2>All Events</h2></div>
    <div id="ev-list"></div>
  </div>

  <div class="page" id="page-courses">
    <div class="topbar"><h2>Courses</h2></div>
    <div id="courses-list"></div>
  </div>
</main>

</div>

<div class="overlay" id="ov-event">
  <div class="modal">
    <h3>Add/Edit Event</h3>
    <div class="frow"><label>Title</label><input class="finput" id="ev-title"></div>
    <div class="frow"><label>Date</label><input type="date" class="finput" id="ev-date"></div>
    <div class="frow">
      <label>Type</label>
      <select class="finput" id="ev-type">
        <option value="assignment">Assignment</option>
        <option value="ct">Class Test</option>
        <option value="presentation">Presentation</option>
        <option value="class">Class</option>
      </select>
    </div>
    <div class="frow">
      <label>Course</label>
      <select class="finput" id="ev-course">
        <option value="Principles of Economics">Principles of Economics</option>
        <option value="Agricultural Policy and Rural Development">Agricultural Policy</option>
        <option value="Population Policy and Gender Studies">Population Policy</option>
        <option value="Development Theories and Policies">Development Theories</option>
      </select>
    </div>
    <div class="fbtns" style="display:flex;gap:0.5rem;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeEvModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEvModal()">Save</button>
    </div>
  </div>
</div>

<script>
const SK = 'mdps-tracker-v3';
let DB = {
  events: [
    {id:1,type:'assignment',title:'Evolution of Economics',date:'2026-03-02',course:'Principles of Economics',done:false}
  ],
  teachers: [],
  settings: { name:'AraFath', id:'MDPS - 261510', theme:'dark', publicFileId:'' }
};

// PERSISTENCE & SYNC
function load() {
  const s = localStorage.getItem(SK);
  if(s) DB = JSON.parse(s);
}

function persist() {
  localStorage.setItem(SK, JSON.stringify(DB));
  scheduleDriveSync();
  if (gDriveUser) {
    publishPublicSnapshot(); // FIXED: Always try to sync public snapshot on any change
  }
}

// UTILS
function dl(d){const t=new Date();t.setHours(0,0,0,0);const x=new Date(d+'T00:00:00');return Math.round((x-t)/86400000);}
const TC={class:'var(--class)',ct:'var(--ct)',assignment:'var(--assign)',presentation:'var(--present)'};

// DASHBOARD
function renderDash() {
  const kpi = document.getElementById('kpi-row');
  const upcoming = DB.events.filter(e => !e.done).sort((a,b)=>new Date(a.date)-new Date(b.date));
  
  if(kpi) kpi.innerHTML = `
    <div class="kpi-card"><div>Pending</div><div class="kpi-title">${upcoming.length}</div></div>
    <div class="kpi-card"><div>Completed</div><div class="kpi-title">${DB.events.filter(e=>e.done).length}</div></div>
    <div class="kpi-card"><div>Next</div><div class="kpi-title">${upcoming[0]?.title || 'None'}</div></div>
  `;

  const evList = document.getElementById('dash-events');
  if(evList) evList.innerHTML = DB.events.map(e => `
    <div class="ecard" onclick="toggleDone(${e.id})">
      <div class="estripe" style="background:${TC[e.type]}"></div>
      <div>
        <div class="etitle">${e.title} ${e.done?'✅':''}</div>
        <div style="font-size:0.7rem;color:var(--text3)">${e.date} · ${e.course}</div>
      </div>
      <div style="font-size:0.7rem;font-weight:700;">${dl(e.date)}d</div>
    </div>
  `).join('');
  
  document.getElementById('nc-all').textContent = upcoming.length;
}

function toggleDone(id) {
  const e = DB.events.find(x=>x.id===id);
  if(e) { e.done = !e.done; persist(); renderDash(); }
}

function go(pg) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pg).classList.add('active');
  if(pg==='dashboard') renderDash();
}

// MODAL LOGIC
function openAddEvent() { document.getElementById('ov-event').classList.add('open'); }
function closeEvModal() { document.getElementById('ov-event').classList.remove('open'); }
function saveEvModal() {
  const e = {
    id: Date.now(),
    title: document.getElementById('ev-title').value,
    date: document.getElementById('ev-date').value,
    type: document.getElementById('ev-type').value,
    course: document.getElementById('ev-course').value,
    done: false
  };
  DB.events.push(e);
  persist(); closeEvModal(); renderDash();
}

// DRIVE SYNC (FIXED OVERWRITE LOGIC)
let gDriveUser = null;
const CLIENT_ID='486694229314-tt7b0q79ju7uf2vjp7ihrpoeohg0ujjc.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/drive.file';

async function publishPublicSnapshot() {
  if (!gapi.client || !gDriveUser) return;
  try {
    const pubData = {
      events: DB.events,
      settings: DB.settings,
      _v: Date.now() // FIXED: Cache busting version stamp
    };
    let pubFileId = DB.settings.publicFileId || localStorage.getItem('mdps-public-file-id');

    if (!pubFileId) {
      const boundary = '-------271828182845';
      const meta = { name: 'mdps-tracker-public.json' };
      const mp = '--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+JSON.stringify(meta)+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+JSON.stringify(pubData)+'\r\n--'+boundary+'--';
      const cr = await gapi.client.request({ path: 'https://www.googleapis.com/upload/drive/v3/files', method: 'POST', params: { uploadType: 'multipart' }, headers: { 'Content-Type': 'multipart/related; boundary="'+boundary+'"' }, body: mp });
      pubFileId = cr.result.id;
      await gapi.client.request({ path: `https://www.googleapis.com/drive/v3/files/${pubFileId}/permissions`, method: 'POST', body: JSON.stringify({ role: 'reader', type: 'anyone' }) });
      DB.settings.publicFileId = pubFileId;
      localStorage.setItem('mdps-public-file-id', pubFileId);
    } else {
      // FIXED: Use PATCH with media upload to force overwrite old data
      await gapi.client.request({
        path: `https://www.googleapis.com/upload/drive/v3/files/${pubFileId}`,
        method: 'PATCH',
        params: { uploadType: 'media' },
        body: JSON.stringify(pubData)
      });
    }
    setDriveStatus('✅ Synced ' + new Date().toLocaleTimeString());
  } catch(e) { console.error(e); }
}

async function tryLoadPublicData() {
  const params = new URLSearchParams(window.location.search);
  const pubFileId = params.get('id');
  if(!pubFileId) return;

  document.body.classList.add('view-only');
  document.body.classList.remove('owner-mode');

  try {
    const r = await fetch(`https://drive.google.com/uc?export=download&id=${pubFileId}&t=${Date.now()}`);
    if(r.ok) {
      const data = await r.json();
      DB.events = data.events;
      renderDash();
      // FIXED: Set up heartbeat refresh every 60 seconds
      setTimeout(tryLoadPublicData, 60000);
    }
  } catch(e) { console.error(e); }
}

function setDriveStatus(s) { document.getElementById('gdrive-status').textContent = s; }
function handleDriveClick() { 
  // Simplified for example: In real usage, call gapi.auth2 logic
  gDriveUser = true; 
  setDriveStatus('Connected');
}
function toggleTheme() { document.body.classList.toggle('light-mode'); }

// INIT
window.onload = () => {
  load();
  renderDash();
  tryLoadPublicData(); // FIXED: Check for shared link on load
  document.getElementById('dash-date').textContent = new Date().toDateString();
};
</script>
</body>
</html>
