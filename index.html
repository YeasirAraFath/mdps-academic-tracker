<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDPS Student Portal</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #5c4fd6; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        header { border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .controls { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; background: #fafafa; padding: 15px; border-radius: 8px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4a3fb8; }
        .btn-outline { background: white; border: 1px solid #ddd; }
        .btn-outline:hover { background: #f0f0f0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; background: #e1f5fe; color: #0288d1; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; color: var(--primary);">MDPS Portal</h1>
            <p style="margin:5px 0 0; color: #666;">Student Management System</p>
        </div>
        <div id="auth-status">
            <button id="signin_button" class="btn btn-primary" onclick="handleAuthClick()">
                <i class="fa-brands fa-google"></i> Sign In
            </button>
            <button id="signout_button" class="btn btn-outline" onclick="handleSignoutClick()" style="display:none;">
                Sign Out
            </button>
        </div>
    </header>

    <div class="controls">
        <input type="text" id="student-search" placeholder="Search by name, ID, or email..." onkeyup="renderStudents()">
        
        <div style="display:flex; gap: 5px;">
            <input type="file" id="excelFile" accept=".xlsx, .xls" style="display:none;" onchange="importStudents()">
            <button class="btn btn-outline" onclick="document.getElementById('excelFile').click()">
                <i class="fa-solid fa-file-import"></i> Import Excel
            </button>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Full Name</th>
                    <th>Email Address</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="students-table">
                </tbody>
        </table>
    </div>
</div>

<script>
    const CLIENT_ID = '486694229314-tt7b0q79ju7uf2vjp7ihrpoeohg0ujjc.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    let tokenClient;
    let gapiInited = false;
    let gisInited = false;
    
    // Load data from LocalStorage on startup
    let STUDENTS = JSON.parse(localStorage.getItem('mdps-students') || '[]');

    function gapiLoaded() {
        gapi.load('client', async () => {
            await gapi.client.init({
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
            });
            gapiInited = true;
            checkInitialization();
        });
    }

    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: '', // defined at runtime
        });
        gisInited = true;
        checkInitialization();
    }

    function checkInitialization() {
        if (gapiInited && gisInited) {
            renderStudents();
        }
    }

    function handleAuthClick() {
        tokenClient.callback = async (resp) => {
            if (resp.error !== undefined) throw (resp);
            document.getElementById('signin_button').style.display = 'none';
            document.getElementById('signout_button').style.display = 'block';
            console.log("Access Token Acquired");
        };

        if (gapi.client.getToken() === null) {
            tokenClient.requestAccessToken({prompt: 'consent'});
        } else {
            tokenClient.requestAccessToken({prompt: ''});
        }
    }

    function handleSignoutClick() {
        const token = gapi.client.getToken();
        if (token !== null) {
            google.accounts.oauth2.revoke(token.access_token);
            gapi.client.setToken('');
            document.getElementById('signin_button').style.display = 'block';
            document.getElementById('signout_button').style.display = 'none';
        }
    }

    function renderStudents() {
        const query = document.getElementById('student-search').value.toLowerCase();
        const tbody = document.getElementById('students-table');
        tbody.innerHTML = '';

        const filtered = STUDENTS.filter(s => 
            !query || 
            String(s.id).toLowerCase().includes(query) || 
            s.name.toLowerCase().includes(query) || 
            s.email.toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; color:#999;">No student records found. Import an Excel file to begin.</td></tr>';
            return;
        }

        filtered.forEach(s => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${s.id || '---'}</strong></td>
                <td>${s.name}</td>
                <td><a href="mailto:${s.email}" style="color:var(--primary); text-decoration:none;"><i class="fa-regular fa-envelope"></i> ${s.email}</a></td>
                <td><span class="status-badge">Enrolled</span></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function importStudents() {
        const file = document.getElementById('excelFile').files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            
            // Convert sheet to JSON
            const rows = XLSX.utils.sheet_to_json(firstSheet);
            
            // Map keys (Adjust 'ID', 'Name', 'Email' to match your Excel columns)
            STUDENTS = rows.map(r => ({
                id: r.ID || r.Id || r['Student ID'] || '',
                name: r.Name || r['Full Name'] || 'Unknown',
                email: r.Email || r['Email Address'] || ''
            }));

            localStorage.setItem('mdps-students', JSON.stringify(STUDENTS));
            renderStudents();
            alert(`Successfully imported ${STUDENTS.length} students!`);
        };
        reader.readAsArrayBuffer(file);
    }

    // Initialize scripts
    window.onload = () => {
        gapiLoaded();
        gisLoaded();
    };
</script>

</body>
</html>
