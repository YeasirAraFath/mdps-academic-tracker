<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDPS Tracker — Khulna University</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg:#f5f6fa; --bg2:#edeef5; --card:#fff; --card2:#f8f8fc;
  --border:#e4e4ee; --border2:#d0d0e0;
  --text:#1a1a2e; --text2:#6b6b8a; --text3:#a8a8c0;
  --ct:#d94f4f; --assign:#b8720a; --present:#5c4fd6; --class:#0d7a56;
  --accent:#5c4fd6;
  --sh:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
  --sh2:0 2px 8px rgba(0,0,0,0.09),0 8px 28px rgba(0,0,0,0.07);
  --r:12px; --rsm:8px; --font:'Geist',sans-serif; --mono:'Geist Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}

/* ── APP LAYOUT ── */
.app{display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{width:245px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform 0.3s;}
.sb-logo{padding:1.3rem 1.2rem 0.9rem;border-bottom:1px solid var(--border);}
.sb-logo h1{font-size:0.92rem;font-weight:700;color:var(--text);}
.sb-logo .ku{font-size:0.65rem;color:var(--accent);font-weight:600;}

.profile-pill{margin:0.8rem 0.9rem;background:var(--bg2);border-radius:var(--r);padding:0.7rem 0.8rem;display:flex;align-items:center;gap:0.7rem;border:1px solid var(--border);}
.pp-av{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.pp-name{font-size:0.8rem;font-weight:600;}
.pp-id{font-size:0.62rem;color:var(--text3);font-family:var(--mono);}

.nb{display:flex;align-items:center;gap:0.55rem;width:100%;padding:0.6rem 1rem;border:none;background:none;color:var(--text2);font-size:0.85rem;cursor:pointer;text-align:left;border-radius:var(--rsm);margin-bottom:2px;}
.nb:hover{background:var(--bg2);}
.nb.active{background:var(--accent);color:#fff;}

/* ── MAIN ── */
.main{flex:1;padding:1.8rem 2.2rem;max-width:calc(100vw - 245px);}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem;margin-bottom:1.4rem;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:var(--sh);position:relative;}
.scard .sl{font-size:0.62rem;text-transform:uppercase;color:var(--text3);margin-bottom:0.35rem;}
.scard .sn{font-size:1.8rem;font-weight:700;}

/* ── TABLES ── */
table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: var(--sh); }
th { background: #f0f2ff; text-align: left; padding: 12px; font-weight: 700; font-size: 0.85rem; }
td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; }

.page { display: none; }
.page.active { display: block; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="sb-logo">
            <h1>MDPS TRACKER</h1>
            <p class="ku">KHULNA UNIVERSITY</p>
        </div>
        
        <div class="profile-pill">
            <div class="pp-av">YA</div>
            <div class="pp-info">
                <p class="pp-name">Yeasir Arafath</p>
                <p class="pp-id">ID: 261510</p>
            </div>
        </div>

        <nav class="sb-nav">
            <button class="nb active" onclick="showPage('dashboard', this)"><i class="fa-solid fa-house"></i> Dashboard</button>
            <button class="nb" onclick="showPage('students', this)"><i class="fa-solid fa-user-graduate"></i> Students</button>
        </nav>
        
        <div style="padding: 1rem; margin-top: auto;">
            <button id="signin_button" class="nb" onclick="handleAuthClick()" style="background: var(--accent); color: white;">
                <i class="fa-brands fa-google"></i> Sign In
            </button>
            <button id="signout_button" class="nb hidden" onclick="handleSignoutClick()">
                <i class="fa-solid fa-right-from-bracket"></i> Sign Out
            </button>
        </div>
    </aside>

    <main class="main">
        <div id="page-dashboard" class="page active">
            <div style="margin-bottom: 1.6rem;">
                <h2>Welcome Back, Yeasir</h2>
                <p style="color: var(--text3); font-size: 0.72rem; font-family: var(--mono);">Session: 2025-2026 | MDPS Portal</p>
            </div>

            <div class="stats">
                <div class="scard"><p class="sl">Total Students</p><p class="sn" id="stat-count">0</p></div>
                <div class="scard"><p class="sl">Courses</p><p class="sn">06</p></div>
                <div class="scard"><p class="sl">Attendance</p><p class="sn" style="color: var(--class);">94%</p></div>
                <div class="scard"><p class="sl">Status</p><p class="sn">Active</p></div>
            </div>
        </div>

        <div id="page-students" class="page">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>Student Registry</h2>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="search" placeholder="Search..." onkeyup="renderStudents()" style="padding: 8px; border-radius: 6px; border: 1px solid var(--border);">
                    <input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden" onchange="importStudents()">
                    <button onclick="document.getElementById('excelFile').click()" style="padding: 8px 15px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer;">
                        <i class="fa-solid fa-file-import"></i> Import Excel
                    </button>
                </div>
            </div>
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Email</th><th>Status</th></tr>
                </thead>
                <tbody id="student-table"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
    const CLIENT_ID = '486694229314-tt7b0q79ju7uf2vjp7ihrpoeohg0ujjc.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    let tokenClient;
    let gapiInited = false;
    let gisInited = false;

    // Pre-loaded Student Data
    let STUDENTS = JSON.parse(localStorage.getItem('mdps-students')) || [
        { id: "261510", name: "Syed Yeasir Arafath", email: "yeasir.arafath@ku.ac.bd" },
        { id: "261501", name: "Tanvir Ahmed", email: "tanvir.mdps@ku.ac.bd" },
        { id: "261515", name: "Nusrat Jahan", email: "nusrat.j@ku.ac.bd" }
    ];

    function gapiLoaded() {
        gapi.load('client', async () => {
            await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
            gapiInited = true;
        });
    }

    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (resp) => {
                if (resp.error) return;
                document.getElementById('signin_button').classList.add('hidden');
                document.getElementById('signout_button').classList.remove('hidden');
            },
        });
        gisInited = true;
    }

    function handleAuthClick() {
        if (gapi.client.getToken() === null) {
            tokenClient.requestAccessToken({prompt: 'consent'});
        } else {
            tokenClient.requestAccessToken({prompt: ''});
        }
    }

    function handleSignoutClick() {
        const token = gapi.client.getToken();
        if (token !== null) {
            google.accounts.oauth2.revoke(token.access_token);
            gapi.client.setToken('');
            document.getElementById('signin_button').classList.remove('hidden');
            document.getElementById('signout_button').classList.add('hidden');
        }
    }

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(pageId === 'students') renderStudents();
    }

    function renderStudents() {
        const q = document.getElementById('search').value.toLowerCase();
        const tbody = document.getElementById('student-table');
        tbody.innerHTML = '';
        
        const filtered = STUDENTS.filter(s => s.name.toLowerCase().includes(q) || s.id.includes(q));
        document.getElementById('stat-count').innerText = filtered.length;

        filtered.forEach(s => {
            tbody.innerHTML += `
                <tr>
                    <td><code>${s.id}</code></td>
                    <td><b>${s.name}</b></td>
                    <td>${s.email}</td>
                    <td><span style="background:#e6f9f2; color:#0d7a56; padding:3px 8px; border-radius:4px; font-size:0.7rem;">Enrolled</span></td>
                </tr>`;
        });
    }

    function importStudents() {
        const file = document.getElementById('excelFile').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            STUDENTS = rows.map(r => ({ 
                id: String(r.ID || r.id || r['Student ID'] || ''), 
                name: r.Name || r['Full Name'] || 'Unknown', 
                email: r.Email || r.email || '' 
            }));
            localStorage.setItem('mdps-students', JSON.stringify(STUDENTS));
            renderStudents();
            alert(`Imported ${STUDENTS.length} students!`);
        };
        reader.readAsArrayBuffer(file);
    }

    window.onload = () => { gapiLoaded(); gisLoaded(); renderStudents(); };
</script>
</body>
</html>
