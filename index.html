<script>

const CLIENT_ID = '486694229314-tt7b0q79ju7uf2vjp7ihrpoeohg0ujjc.apps.googleusercontent.com';
const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

let tokenClient;
let gapiInited = false;
let gisInited = false;
let driveFileId = null;

function gapiLoaded() {
    gapi.load('client', async () => {
        await gapi.client.init({ discoveryDocs: [DISCOVERY_DOC] });
        gapiInited = true;
    });
}

function gisLoaded() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
            if (resp.error !== undefined) throw (resp);
            document.getElementById('sync-banner').style.display = 'block';
            await syncWithDrive();
        },
    });
    gisInited = true;
}

async function handleAuthClick() {
    tokenClient.requestAccessToken({prompt: 'consent'});
}

// --- [CORE LOGIC] ---
let EVENTS = JSON.parse(localStorage.getItem('mdps-events') || '[]');
let TEACHERS = JSON.parse(localStorage.getItem('mdps-teachers') || '[]');
let STUDENTS = JSON.parse(localStorage.getItem('mdps-students') || '[]');

// Update Save functions to also push to Drive
function saveAll() {
    localStorage.setItem('mdps-events', JSON.stringify(EVENTS));
    localStorage.setItem('mdps-teachers', JSON.stringify(TEACHERS));
    localStorage.setItem('mdps-students', JSON.stringify(STUDENTS));
    if (driveFileId) updateDriveFile();
}

async function syncWithDrive() {
    let response = await gapi.client.drive.files.list({
        q: "name = 'mdps_tracker_data.json' and trashed = false",
        fields: 'files(id, name)',
    });
    let files = response.result.files;
    if (files.length > 0) {
        driveFileId = files[0].id;
        const content = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
        const driveData = content.result;
        // Merge data
        EVENTS = driveData.events || [];
        TEACHERS = driveData.teachers || [];
        STUDENTS = driveData.students || [];
        renderAll();
    } else {
        await createDriveFile();
    }
}

async function createDriveFile() {
